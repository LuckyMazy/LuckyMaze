# Local dev / e2e infrastructure with a fake OIDC provider, so the backend can run
# without the one-time Pocket ID admin setup. Bring this up, then run the API on the
# host (see e2e/README.md) — everything resolves via localhost, so the token issuer
# matches what the API validates (LuckyMaze has a single Oidc:Authority, no internal/
# external split).
services:
  postgres:
    image: postgres:18.3
    container_name: luckymaze-postgres-test
    environment:
      POSTGRES_DB: luckymaze-test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luckymaze-test"]
      interval: 2s
      timeout: 2s
      retries: 30

  mock-oauth2:
    # The mock-oauth2-server image is built FROM a JRE-only base - no shell, no wget/curl -
    # so a CMD-SHELL healthcheck can't run. Probe readiness from the host instead.
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: luckymaze-mock-oauth2
    environment:
      JSON_CONFIG_PATH: /app/config.json
    volumes:
      - ./mock-oauth2-config.json:/app/config.json:ro
    ports:
      - "18080:8080"
