<section hlmCard class="max-w-4xl mx-auto mt-6">
  <div hlmCardHeader>
    <h1 hlmCardTitle class="text-3xl">Admin Dashboard</h1>
    <p hlmCardDescription>Configure global game settings. These settings will apply to the next generated maze.</p>
  </div>

  <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
    <div hlmCardContent class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="space-y-2">
        <label hlmLabel>Maze Size</label>
        <select hlmNativeSelect formControlName="mazeSize">
          <option *ngFor="let size of mazeSizes" [ngValue]="size.value" hlmNativeSelectOption>{{ size.label }}</option>
        </select>
        <p class="text-sm text-muted-foreground">Determines the dimensions of the generated maze.</p>
      </div>

      <div class="space-y-2">
        <label hlmLabel>Game Speed (ms)</label>
        <input type="number" hlmInput formControlName="gameSpeedMs" class="w-full">
        <p class="text-sm text-muted-foreground">Delay between AI steps. Lower is faster.</p>
      </div>

      <div class="space-y-2">
        <label hlmLabel>Minimum Bet</label>
        <input type="number" step="0.01" hlmInput formControlName="minBet" class="w-full">
        <p class="text-sm text-muted-foreground">The smallest bet allowed.</p>
      </div>

      <div class="space-y-2">
        <label hlmLabel>Maximum Bet</label>
        <input type="number" step="1" hlmInput formControlName="maxBet" class="w-full">
        <p class="text-sm text-muted-foreground">The largest bet allowed.</p>
      </div>
      
    </div>

    <div hlmCardFooter class="justify-end">
      <button type="submit" hlmBtn [disabled]="settingsForm.invalid">
        Save Settings
      </button>
    </div>
  </form>
</section>
