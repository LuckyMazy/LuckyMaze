<div class="p-6 max-w-4xl mx-auto text-white">
  <div class="mb-8">
    <h1 class="text-3xl font-bold mb-2">Admin Dashboard</h1>
    <p class="text-zinc-400">Configure global game settings. These settings will apply to the next generated maze.</p>
  </div>

  <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()" class="space-y-6 bg-zinc-900/50 p-6 rounded-lg border border-zinc-800 backdrop-blur">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="space-y-2">
        <label hlmLabel>Maze Size</label>
        <select hlmNativeSelect formControlName="mazeSize">
          <option *ngFor="let size of mazeSizes" [ngValue]="size.value" hlmNativeSelectOption>{{ size.label }}</option>
        </select>
        <p class="text-xs text-zinc-500">Determines the dimensions of the generated maze.</p>
      </div>

      <div class="space-y-2">
        <label hlmLabel>Game Speed (ms)</label>
        <input type="number" hlmInput formControlName="gameSpeedMs" class="w-full">
        <p class="text-xs text-zinc-500">Delay between AI steps. Lower is faster.</p>
      </div>

      <div class="space-y-2">
        <label hlmLabel>Minimum Bet</label>
        <input type="number" step="0.01" hlmInput formControlName="minBet" class="w-full">
        <p class="text-xs text-zinc-500">The smallest bet allowed.</p>
      </div>

      <div class="space-y-2">
        <label hlmLabel>Maximum Bet</label>
        <input type="number" step="1" hlmInput formControlName="maxBet" class="w-full">
        <p class="text-xs text-zinc-500">The largest bet allowed.</p>
      </div>
      
    </div>

    <div class="pt-4 border-t border-zinc-800 flex justify-end">
      <button type="submit" hlmBtn [disabled]="settingsForm.invalid">
        Save Settings
      </button>
    </div>
  </form>
</div>
